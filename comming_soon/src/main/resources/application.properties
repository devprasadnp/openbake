spring.application.name=coming-soon
server.port=8080

# File where notify-me emails are appended (created on first subscribe).
# Defaults to the home directory of the user running Tomcat, which is
# writable regardless of where Tomcat was started from.
app.subscribers-file=${user.home}/vinayaka-subscribers.csv

# ---------------------------------------------------------------------------
# Subscriber notification mail
# ---------------------------------------------------------------------------
# Every new signup triggers an email to this inbox:
app.notification-to=hello@srivinayakabakeryhome.com

# SMTP account used to SEND that mail. Until spring.mail.host is set, mail is
# skipped (with a log warning) and signups still work. Fill these in — or set
# them as environment variables in Tomcat (SPRING_MAIL_HOST, SPRING_MAIL_USERNAME,
# SPRING_MAIL_PASSWORD) so credentials stay out of the WAR.
#
# Example for Gmail (use an App Password, not the account password):
spring.mail.host=mail.srivinayakabakeryhome.com
spring.mail.port=465
spring.mail.username=hello@srivinayakabakeryhome.com
spring.mail.password=srivinayakabakeryhome@123
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=false
# Port 465 is implicit-SSL (SMTPS) — without this JavaMail talks plaintext and hangs
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000