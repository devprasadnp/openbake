<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Checkout - Delivery &amp; Time Slot</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FFF8F2;
            color: #1e1b18;
        }
        .editorial-title {
            font-family: 'Playfair Display', serif;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background min-h-screen pb-32">
<!-- TopAppBar Component (from JSON) -->
<header class="fixed top-0 w-full z-50 bg-[#FFF8F2] dark:bg-stone-900 flex items-center justify-between px-6 py-4">
<div class="flex items-center gap-4">
<button class="text-[#8C4B10] hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
</div>
<h1 class="font-serif text-2xl font-bold tracking-tight text-[#8C4B10]">Checkout</h1>
<div class="w-10"></div> <!-- Spacer for center alignment -->
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto">
<!-- Step Indicator -->
<div class="flex justify-between items-center mb-10 px-2">
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-outline-variant flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined text-sm" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest text-stone-500">Details</span>
</div>
<div class="flex-1 h-[2px] bg-outline-variant mx-4 mb-6 opacity-30"></div>
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-white ring-4 ring-primary-container/20">
<span class="font-serif text-lg font-bold">2</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest text-primary">Time Slot</span>
</div>
<div class="flex-1 h-[2px] bg-outline-variant mx-4 mb-6 opacity-30"></div>
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full border border-outline-variant flex items-center justify-center text-stone-400">
<span class="font-serif text-sm">3</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-widest text-stone-400">Payment</span>
</div>
</div>
<!-- Mode Toggle (Pill Style) -->
<section class="mb-12">
<div class="bg-surface-container-highest p-1.5 rounded-full flex">
<button class="flex-1 py-3 px-6 rounded-full bg-surface-container-lowest text-primary font-bold shadow-sm transition-all duration-300">
                    Delivery
                </button>
<button class="flex-1 py-3 px-6 rounded-full text-on-surface-variant font-medium hover:text-primary transition-all duration-300">
                    Pickup
                </button>
</div>
</section>
<!-- Delivery Address Summary (Contextual) -->
<div class="bg-surface-container-low p-6 rounded-DEFAULT mb-12 flex justify-between items-start">
<div class="space-y-1">
<p class="text-[10px] uppercase tracking-widest font-bold text-stone-500">Delivering to</p>
<p class="text-on-surface font-semibold">24 Highgrove Lane, Bristol</p>
</div>
<button class="text-primary text-sm font-bold flex items-center gap-1">
                Change <span class="material-symbols-outlined text-base" data-icon="edit">edit</span>
</button>
</div>
<!-- Date Picker (Horizontal) -->
<section class="mb-12">
<div class="flex justify-between items-end mb-6">
<h2 class="editorial-title text-3xl text-on-surface">Select Date</h2>
<span class="text-sm font-sans text-stone-500">October 2024</span>
</div>
<div class="flex gap-4 overflow-x-auto hide-scrollbar pb-2">
<!-- Selected Date -->
<button class="flex-shrink-0 w-20 h-28 rounded-2xl bg-gradient-to-br from-[#8C4B10] to-[#AA6328] flex flex-col items-center justify-center text-white shadow-lg transition-transform hover:scale-105 active:scale-95">
<span class="text-[10px] uppercase tracking-widest font-bold opacity-80">Fri</span>
<span class="text-3xl font-serif font-bold my-1">18</span>
<div class="w-1 h-1 rounded-full bg-white mt-1"></div>
</button>
<!-- Other Dates -->
<button class="flex-shrink-0 w-20 h-28 rounded-2xl bg-surface-container-lowest border border-outline-variant/10 flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors">
<span class="text-[10px] uppercase tracking-widest font-bold text-stone-400">Sat</span>
<span class="text-3xl font-serif font-bold my-1">19</span>
</button>
<button class="flex-shrink-0 w-20 h-28 rounded-2xl bg-surface-container-lowest border border-outline-variant/10 flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors">
<span class="text-[10px] uppercase tracking-widest font-bold text-stone-400">Sun</span>
<span class="text-3xl font-serif font-bold my-1">20</span>
</button>
<button class="flex-shrink-0 w-20 h-28 rounded-2xl bg-surface-container-lowest border border-outline-variant/10 flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors">
<span class="text-[10px] uppercase tracking-widest font-bold text-stone-400">Mon</span>
<span class="text-3xl font-serif font-bold my-1">21</span>
</button>
<button class="flex-shrink-0 w-20 h-28 rounded-2xl bg-surface-container-lowest border border-outline-variant/10 flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors">
<span class="text-[10px] uppercase tracking-widest font-bold text-stone-400">Tue</span>
<span class="text-3xl font-serif font-bold my-1">22</span>
</button>
</div>
</section>
<!-- Time Slot Grid -->
<section class="mb-12">
<div class="flex items-center gap-3 mb-6">
<h2 class="editorial-title text-3xl text-on-surface">Time Slot</h2>
<span class="px-2 py-0.5 bg-tertiary-container/10 text-tertiary text-[10px] font-bold rounded uppercase tracking-tighter">Fastest Available</span>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Morning Slot -->
<button class="p-5 rounded-DEFAULT bg-surface-container-low text-left border border-transparent hover:border-primary/20 transition-all group">
<div class="flex items-center justify-between mb-4">
<span class="material-symbols-outlined text-primary" data-icon="light_mode">light_mode</span>
<div class="w-4 h-4 rounded-full border-2 border-outline transition-colors group-hover:border-primary"></div>
</div>
<p class="text-[10px] uppercase tracking-widest font-bold text-stone-500 mb-1">Morning</p>
<p class="font-sans font-bold text-on-surface">08 AM - 10 AM</p>
</button>
<!-- Selected Slot -->
<button class="p-5 rounded-DEFAULT bg-surface-container-lowest text-left ring-2 ring-primary shadow-xl shadow-primary/5 relative">
<div class="flex items-center justify-between mb-4">
<span class="material-symbols-outlined text-primary" data-icon="sunny" data-weight="fill" style="font-variation-settings: 'FILL' 1;">sunny</span>
<div class="w-4 h-4 rounded-full bg-primary flex items-center justify-center">
<div class="w-1.5 h-1.5 rounded-full bg-white"></div>
</div>
</div>
<p class="text-[10px] uppercase tracking-widest font-bold text-primary mb-1">Brunch</p>
<p class="font-sans font-bold text-on-surface">10 AM - 12 PM</p>
</button>
<!-- Afternoon Slot -->
<button class="p-5 rounded-DEFAULT bg-surface-container-low text-left border border-transparent hover:border-primary/20 transition-all group">
<div class="flex items-center justify-between mb-4">
<span class="material-symbols-outlined text-stone-500" data-icon="wb_sunny">wb_sunny</span>
<div class="w-4 h-4 rounded-full border-2 border-outline transition-colors group-hover:border-primary"></div>
</div>
<p class="text-[10px] uppercase tracking-widest font-bold text-stone-500 mb-1">Afternoon</p>
<p class="font-sans font-bold text-on-surface">12 PM - 02 PM</p>
</button>
<!-- Evening Slot -->
<button class="p-5 rounded-DEFAULT bg-surface-container-low text-left border border-transparent hover:border-primary/20 transition-all group">
<div class="flex items-center justify-between mb-4">
<span class="material-symbols-outlined text-stone-500" data-icon="bedtime">bedtime</span>
<div class="w-4 h-4 rounded-full border-2 border-outline transition-colors group-hover:border-primary"></div>
</div>
<p class="text-[10px] uppercase tracking-widest font-bold text-stone-500 mb-1">Evening</p>
<p class="font-sans font-bold text-on-surface">04 PM - 06 PM</p>
</button>
</div>
</section>
<!-- Aesthetic Note / Tip -->
<div class="bg-[#FFF8F2] border border-[#8C4B10]/10 p-6 rounded-DEFAULT flex gap-4 items-center">
<div class="w-12 h-12 rounded-full overflow-hidden flex-shrink-0">
<img alt="Baker" class="w-full h-full object-cover" data-alt="Close-up of a baker's hands dusting flour onto fresh dough with warm natural morning light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC4-o7WaO_w7eacLQljMzowHIu2ZNXfVPtnnJqZ4ZgypqT4PpSTjMc4siyEh5DmfanlmcbfH6UobsYMZvc5ggj1R3NvgIikEC9m4zyMdcbo0G06eTCtlE1JGm2fQbjPLyWZP75BUuCP6ypH8pPdPj-HFYSv7Cb_CAYboaRzpElG82Lm9sd1xuBqZnSaEVAmwtBfQoASF4ar3iMxNkbN-sbuGsIG91xZEIIzqS2-5wtQzkkhn8t0VK-4y8GdfsqhGGwbAyGlT2GmFfo"/>
</div>
<p class="text-sm font-sans text-stone-600 italic">
                "Our sourdough is baked fresh at 4 AM daily. Morning slots guarantee the warmest crust!"
            </p>
</div>
</main>
<!-- Floating Action Footer -->
<footer class="fixed bottom-0 left-0 w-full bg-[#FFF8F2]/80 backdrop-blur-xl border-t border-[#8C4B10]/10 px-6 pt-4 pb-8 z-50">
<div class="max-w-2xl mx-auto flex items-center justify-between gap-6">
<div class="flex flex-col">
<span class="text-[10px] uppercase tracking-widest font-bold text-stone-500">Total Estimate</span>
<span class="text-2xl font-serif font-bold text-[#8C4B10]">£42.50</span>
</div>
<!-- Continue Button in Caramel Brown (#C2773A) per requirements -->
<button class="bg-[#C2773A] text-white py-4 px-10 rounded-full font-sans font-bold text-lg shadow-xl shadow-[#C2773A]/20 active:scale-95 transition-transform flex items-center gap-2">
                Continue to Payment
                <span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</footer>
<!-- BottomNavBar Suppressed per "Task-Focused" rule in Shell Visibility logic -->
</body></html>
