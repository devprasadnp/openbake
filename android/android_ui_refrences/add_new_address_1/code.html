<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&amp;family=Nunito:ital,wght@0,200..1000;1,200..1000&amp;family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-sans { font-family: 'Nunito', sans-serif; }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-fixed": "#ffdad2",
                        "on-primary-container": "#fffbff",
                        "on-primary": "#ffffff",
                        "surface-container-high": "#eee7e1",
                        "secondary-fixed-dim": "#ffb780",
                        "primary": "#8c4b10",
                        "secondary": "#8e4e14",
                        "on-surface": "#1e1b18",
                        "on-primary-fixed": "#301400",
                        "error": "#ba1a1a",
                        "on-error-container": "#93000a",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#3c0700",
                        "inverse-primary": "#ffb782",
                        "surface-tint": "#8f4e13",
                        "error-container": "#ffdad6",
                        "on-surface-variant": "#534439",
                        "on-secondary-fixed-variant": "#6f3800",
                        "secondary-container": "#ffab69",
                        "primary-fixed": "#ffdcc5",
                        "outline-variant": "#d8c2b4",
                        "on-secondary-fixed": "#2f1400",
                        "background": "#fff8f2",
                        "on-tertiary-container": "#fffbff",
                        "on-error": "#ffffff",
                        "tertiary": "#a03b21",
                        "on-primary-fixed-variant": "#703800",
                        "surface-container-highest": "#e8e1dc",
                        "inverse-on-surface": "#f6f0ea",
                        "surface-container": "#f3ede7",
                        "outline": "#867468",
                        "secondary-fixed": "#ffdcc4",
                        "surface": "#fff8f2",
                        "primary-container": "#aa6328",
                        "on-background": "#1e1b18",
                        "tertiary-fixed-dim": "#ffb4a2",
                        "tertiary-container": "#c05237",
                        "on-tertiary-fixed-variant": "#83260e",
                        "on-secondary": "#ffffff",
                        "surface-dim": "#dfd9d3",
                        "surface-container-low": "#f9f2ec",
                        "primary-fixed-dim": "#ffb782",
                        "surface-bright": "#fff8f2",
                        "inverse-surface": "#33302c",
                        "on-secondary-container": "#783d01",
                        "surface-variant": "#e8e1dc",
                        "on-tertiary": "#ffffff"
                    },
                    fontFamily: {
                        "headline": ["Newsreader"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#FFF8F2]/80 dark:bg-[#1E1B18]/80 backdrop-blur-xl shadow-sm shadow-[#1E1B18]/5 flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="active:scale-95 duration-200 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-[#8C4B10] dark:text-[#C2773A]">arrow_back</span>
</button>
<h1 class="font-serif text-2xl tracking-tight Playfair Display text-[#8C4B10] dark:text-[#C2773A]">
                Amber <span class="italic">Hearth</span>
</h1>
</div>
<div class="flex items-center gap-4">
<button class="active:scale-95 duration-200 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-[#8C4B10] dark:text-[#C2773A]">shopping_bag</span>
</button>
</div>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto space-y-10">
<!-- Hero Section -->
<section class="space-y-2">
<h2 class="font-headline text-4xl md:text-5xl text-primary leading-tight">Where should we deliver?</h2>
<p class="text-on-surface-variant text-sm font-label uppercase tracking-widest opacity-80">Add a new destination for your artisanal treats</p>
</section>
<!-- Map Snippet Section -->
<section class="relative h-64 w-full rounded-lg overflow-hidden shadow-2xl shadow-[#1E1B18]/10 group">
<div class="absolute inset-0 bg-surface-container-highest animate-pulse">
<img class="w-full h-full object-cover grayscale-[20%] sepia-[10%] opacity-90 transition-transform duration-700 group-hover:scale-105" data-alt="Soft aesthetic map view of a city neighborhood with warm golden highlights and clean minimalist street lines" data-location="San Francisco" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCxFbklVmH7OazSxHJVsOdHUohT6gBcFiyqXycUvGERdx-260VTI3CKo8KJ284oqmH_JXYEGoJUiAcGtkJWbvcxVwQ2Zuqm4wUoT6J067KkUCL-0GA-8ekiBl8VZmh_bDBVafGhqCMQLqMzSGrvM0tkpw_IzqXtURQ1QDdRE4UA4Gf9zkc5wn6DJCsVdtf5rk5z3RGfQ3vtzMsK5M23z11lRpH1AjpOliaWF_vIi9nwlxztD4YWJBzBMrbm7xsGUvZCxSajRG_vBIg"/>
</div>
<!-- Map Overlay UI -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="bg-surface/90 backdrop-blur-md p-4 rounded-full shadow-lg border border-primary/10">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
</div>
<div class="absolute bottom-4 right-4 flex flex-col gap-2">
<button class="bg-surface-container-lowest p-3 rounded-full shadow-md text-primary hover:bg-primary hover:text-white transition-all duration-300">
<span class="material-symbols-outlined">my_location</span>
</button>
</div>
</section>
<!-- Form Section -->
<form class="space-y-8">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Address Line 1 (Full Width) -->
<div class="md:col-span-2 space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-primary px-1">Address Line 1</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-0 ring-1 ring-outline-variant/30 rounded-[12px] px-4 py-4 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-300 placeholder:text-on-surface-variant/40" placeholder="e.g. 123 Baker Street" type="text"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline-variant">map</span>
</div>
</div>
<!-- Flat/House No. -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-primary px-1">Flat / House No.</label>
<input class="w-full bg-surface-container-low border-0 ring-1 ring-outline-variant/30 rounded-[12px] px-4 py-4 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-300 placeholder:text-on-surface-variant/40" placeholder="Apartment 4B" type="text"/>
</div>
<!-- Landmark -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-primary px-1">Landmark</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-0 ring-1 ring-outline-variant/30 rounded-[12px] px-4 py-4 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-300 placeholder:text-on-surface-variant/40" placeholder="Near the old oak tree" type="text"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline-variant">flag</span>
</div>
</div>
</div>
<!-- Save As Section -->
<div class="space-y-4">
<label class="text-xs font-bold uppercase tracking-widest text-primary px-1">Save address as</label>
<div class="flex flex-wrap gap-4">
<label class="cursor-pointer group">
<input checked="" class="hidden peer" name="save_as" type="radio"/>
<div class="flex items-center gap-2 px-6 py-3 rounded-full border border-outline-variant/30 bg-surface-container-low text-on-surface-variant peer-checked:bg-gradient-to-br peer-checked:from-[#8C4B10] peer-checked:to-[#AA6328] peer-checked:text-white peer-checked:border-0 peer-checked:shadow-md transition-all duration-300">
<span class="material-symbols-outlined text-xl">home</span>
<span class="font-bold text-sm">Home</span>
</div>
</label>
<label class="cursor-pointer group">
<input class="hidden peer" name="save_as" type="radio"/>
<div class="flex items-center gap-2 px-6 py-3 rounded-full border border-outline-variant/30 bg-surface-container-low text-on-surface-variant peer-checked:bg-gradient-to-br peer-checked:from-[#8C4B10] peer-checked:to-[#AA6328] peer-checked:text-white peer-checked:border-0 peer-checked:shadow-md transition-all duration-300">
<span class="material-symbols-outlined text-xl">work</span>
<span class="font-bold text-sm">Work</span>
</div>
</label>
<label class="cursor-pointer group">
<input class="hidden peer" name="save_as" type="radio"/>
<div class="flex items-center gap-2 px-6 py-3 rounded-full border border-outline-variant/30 bg-surface-container-low text-on-surface-variant peer-checked:bg-gradient-to-br peer-checked:from-[#8C4B10] peer-checked:to-[#AA6328] peer-checked:text-white peer-checked:border-0 peer-checked:shadow-md transition-all duration-300">
<span class="material-symbols-outlined text-xl">favorite</span>
<span class="font-bold text-sm">Other</span>
</div>
</label>
</div>
</div>
<!-- Save Button -->
<div class="pt-6">
<button class="w-full py-5 rounded-full bg-gradient-to-br from-[#8C4B10] to-[#AA6328] text-white font-bold text-lg shadow-xl shadow-primary/20 active:scale-[0.98] transition-all duration-300 flex items-center justify-center gap-3 group" type="submit">
                    Save Address
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</form>
<!-- Aesthetic Flourish -->
<div class="py-12 flex justify-center opacity-10 select-none pointer-events-none">
<span class="material-symbols-outlined text-9xl">bakery_dining</span>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-[#FFF8F2]/80 dark:bg-[#1E1B18]/80 backdrop-blur-xl z-50 rounded-t-[32px] shadow-[0_-4px_24px_rgba(30,27,24,0.06)]">
<a class="flex flex-col items-center justify-center text-[#1E1B18]/50 dark:text-[#FFF8F2]/50 px-5 py-2 hover:text-[#8C4B10] transition-colors active:scale-90 duration-300" href="#">
<span class="material-symbols-outlined mb-1">home</span>
<span class="font-sans text-[10px] uppercase tracking-widest Nunito">Hearth</span>
</a>
<a class="flex flex-col items-center justify-center text-[#1E1B18]/50 dark:text-[#FFF8F2]/50 px-5 py-2 hover:text-[#8C4B10] transition-colors active:scale-90 duration-300" href="#">
<span class="material-symbols-outlined mb-1">search</span>
<span class="font-sans text-[10px] uppercase tracking-widest Nunito">Search</span>
</a>
<a class="flex flex-col items-center justify-center text-[#1E1B18]/50 dark:text-[#FFF8F2]/50 px-5 py-2 hover:text-[#8C4B10] transition-colors active:scale-90 duration-300" href="#">
<span class="material-symbols-outlined mb-1">receipt_long</span>
<span class="font-sans text-[10px] uppercase tracking-widest Nunito">Orders</span>
</a>
<a class="flex flex-col items-center justify-center bg-gradient-to-br from-[#8C4B10] to-[#AA6328] text-white rounded-full px-5 py-2 active:scale-90 duration-300" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-sans text-[10px] uppercase tracking-widest Nunito">Profile</span>
</a>
</nav>
</body></html>
