# ─────────────────────────────────────────────────────────────────────────────
# OpenBake — production docker-compose
# Copy server/.env.example → server/.env and fill in values before running.
#
# Note: server/.env is loaded into the `server` container via env_file, but the
# ${MYSQL_*} references below (used for both the `db` service and to build the
# server's DATABASE_URL) are resolved by Compose itself from the shell
# environment or a root-level .env file — not from server/.env. Export them or
# add a root .env with the same MYSQL_* values if you change them from the
# defaults.
#
# Usage: docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MySQL ──────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: openbake-db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_change_me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-openbake}
      MYSQL_USER: ${MYSQL_USER:-bakery_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-bakery_pass}
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root_change_me}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Spring Boot server (API + embedded web app) ───────────────────────────────
  server:
    build:
      # Build context is the repo root — the Maven build embeds ../web's static
      # export into the jar (see server/pom.xml's build-web profile).
      context: .
      dockerfile: server/Dockerfile
    container_name: openbake-server
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      APP_ENV: production
      DATABASE_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-openbake}?useSSL=false&allowPublicKeyRetrieval=true
      DATABASE_USERNAME: ${MYSQL_USER:-bakery_user}
      DATABASE_PASSWORD: ${MYSQL_PASSWORD:-bakery_pass}
    volumes:
      - mediadata:/app/media
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - internal
      - public

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: openbake-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - server
    networks:
      - public

volumes:
  dbdata:
  mediadata:

networks:
  internal:
    driver: bridge
  public:
    driver: bridge
